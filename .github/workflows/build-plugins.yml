name: Build and Release Plugins

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Grant execute permission to gradlew
        run: chmod +x gradlew

      - name: Build all plugins
        run: ./gradlew packagePlugin --parallel

      - name: List built .omni files
        run: ls -la dist/

      - name: Delete existing latest release
        run: gh release delete latest --yes --cleanup-tag || true
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create latest release and upload .omni files
        run: |
          gh release create latest dist/*.omni \
            --title "Latest Plugins" \
            --notes "Auto-built from main branch. Install via Plugin Manager → Add Repository." \
            --latest
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
